<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}ExpenseIQ{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    {% block head %}{% endblock %}
</head>
<body>

    <nav class="navbar">
        <div class="nav-inner">
            <a href="{{ url_for('landing') }}" class="nav-brand">
                <span class="brand-icon">
                    <svg viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                        <path d="M8 12a12 12 0 0 1 20-6" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
                        <path d="M27 4.5l3 5.5-5.5-1.2" fill="currentColor"/>
                        <path d="M32 28a12 12 0 0 1-20 6" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
                        <path d="M13 35.5l-3-5.5 5.5 1.2" fill="currentColor"/>
                        <circle cx="20" cy="20" r="9.5" fill="currentColor"/>
                        <text x="20" y="25.5" text-anchor="middle" font-size="13" font-weight="700" fill="var(--paper)" font-family="'DM Sans', sans-serif">₹</text>
                    </svg>
                </span>
                <span class="brand-name">ExpenseIQ</span>
            </a>
            <div class="nav-links">
                <a href="{{ url_for('login') }}">Sign in</a>
                <a href="{{ url_for('register') }}" class="nav-cta">Get started</a>
            </div>
        </div>
    </nav>

    <main class="main-content">
        {% block content %}{% endblock %}
    </main>

    <footer class="footer">
        <div class="footer-inner">
            <span class="brand-icon">
                <svg viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                    <path d="M8 12a12 12 0 0 1 20-6" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
                    <path d="M27 4.5l3 5.5-5.5-1.2" fill="currentColor"/>
                    <path d="M32 28a12 12 0 0 1-20 6" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
                    <path d="M13 35.5l-3-5.5 5.5 1.2" fill="currentColor"/>
                    <circle cx="20" cy="20" r="9.5" fill="currentColor"/>
                    <text x="20" y="25.5" text-anchor="middle" font-size="13" font-weight="700" fill="var(--paper)" font-family="'DM Sans', sans-serif">₹</text>
                </svg>
            </span>
            <span class="footer-name">ExpenseIQ</span>
            <p class="footer-copy">Track every rupee. Own your finances.</p>
            <a href="/terms">Terms and Conditions</a>
            <a href="/privacy">Privacy Policy</a>
        </div>
    </footer>

    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
